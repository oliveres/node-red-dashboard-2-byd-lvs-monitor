<script type="text/javascript">
    (function () {
        RED.nodes.registerType('byd-lvs-dashboard', {
            category: 'BYD Battery',
            color: '#4CAF50',
            defaults: {
                name: { value: '' },
                group: { type: 'ui-group', required: true },
                width: {
                    value: 12,
                    validate: function (v) {
                        const currentGroup = $('#node-input-group').val() || this.group;
                        const groupNode = RED.nodes.node(currentGroup);
                        const valid = !groupNode || !v || +v <= +groupNode.width;
                        $('#node-input-width').toggleClass('input-error', !valid);
                        return valid;
                    }
                },
                height: { value: 10 },
                driftHighThreshold: { value: 50 },
                driftLowThreshold: { value: 50 }
            },
            inputs: 1,
            outputs: 0,
            icon: 'byd-battery.svg',
            paletteLabel: 'BYD LVS dashboard',
            label: function () {
                return this.name || 'BYD LVS dashboard';
            },
            oneditprepare: function () {
                $('#node-input-size').elementSizer({
                    width: '#node-input-width',
                    height: '#node-input-height',
                    group: '#node-input-group'
                });
            }
        });
    })();
</script>

<script type="text/html" data-help-name="byd-lvs-dashboard">
    <p>Dashboard widget for BYD Battery-Box LVS monitoring data.</p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Output from the <b>BYD LVS read</b> node (live data).</dd>
    </dl>

    <h3>Tabs</h3>
    <ul>
        <li><b>Overview</b> — SOC gauge, pack voltage, current, temperatures, module table</li>
        <li><b>Cell Voltages</b> — Heatmap of cell voltages per module</li>
        <li><b>Graphs</b> — 24-hour rolling history charts (data builds up from live scans, lost on Node-RED restart)</li>
        <li><b>Temps</b> — Temperature grid per module with min/max highlighting</li>
        <li><b>Energy Throughput</b> — Charge/discharge energy counters, estimated cycles, warranty status</li>
        <li><b>Drift Log</b> — Long-term cell voltage drift heatmap (90-day JSONL log on disk)</li>
        <li><b>Help</b> — Built-in data interpretation guide (EN/CZ/DE)</li>
    </ul>

    <h3>Setup</h3>
    <p>Connect the <b>BYD LVS read</b> node output to this node.
    Live data is displayed immediately. History charts build up automatically
    from incoming scans (last 24 hours kept in memory).</p>

    <h3>Drift Detection</h3>
    <p>On each scan, the node computes the median cell voltage per module. If any cell
    exceeds the median by more than the configured threshold, it is logged as a drift event.
    Daily peaks are saved to a JSONL file in your Node-RED user directory
    (<code>byd-drift-log.jsonl</code>), retained for 90 days.</p>
    <p><b>Drift High (mV)</b> — threshold above the median to flag high drift (default 50 mV).</p>
    <p><b>Drift Low (mV)</b> — threshold below the median to flag low drift (default 50 mV).</p>
</script>
